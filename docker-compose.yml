services:
  # Тяжёлый чат+голос (семантика e5 + Whisper/Silero). Профиль full, сервер ≥4 ГБ.
  voice_server:
    build:
      context: ./student_assistant/bot
      args:
        VARIANT: full
    profiles: ["full"]
    networks:
      default:
        aliases: [chat_backend]   # стабильный апстрим для nginx /api/voice
    command: uvicorn voice_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8010:8000"
    environment:
      - RAG_MODE=semantic
      - ENABLE_VOICE=true
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - FAQ_PATH=/app/faq.json
      - CORPUS_PATH=/app/corpus.npz
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
      - RAG_MIN_SCORE=${RAG_MIN_SCORE:-0.85}
      - VIDEO_MIN_SCORE=${VIDEO_MIN_SCORE:-0.86}
      - REQUESTS_LOG=/data/requests.jsonl
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
    volumes:
      # Кэш моделей Whisper/Silero/эмбеддингов — чтобы не качать при каждом рестарте
      - model-cache:/root/.cache
      # Логи запросов наружу — их грузит дашборд аналитики
      - ./logs:/data
      # Единый FAQ (выход пайплайна) — правки без пересборки образа
      - ./student_assistant/data/faq.json:/app/faq.json:ro
      # Семантический индекс RAG (выход build_corpus.py)
      - ./student_assistant/data/corpus.npz:/app/corpus.npz:ro

  # Лёгкий чат (keyword-FAQ + DeepSeek, без torch и голоса). Профиль light, влезает на 1 ГБ.
  chat_light:
    build:
      context: ./student_assistant/bot
      args:
        VARIANT: light
    profiles: ["light"]
    networks:
      default:
        aliases: [chat_backend]   # стабильный апстрим для nginx /api/voice
    command: uvicorn voice_server:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8010:8000"
    environment:
      - RAG_MODE=keyword
      - ENABLE_VOICE=false
      - FAQ_PATH=/app/faq.json
      - REQUESTS_LOG=/data/requests.jsonl
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
    volumes:
      - ./logs:/data
      - ./student_assistant/data/faq.json:/app/faq.json:ro

  # Telegram-бот студента. Нужен BOT_TOKEN в .env — иначе сервис не стартует.
  # Запуск: docker compose up -d student_bot
  student_bot:
    build: ./student_assistant/bot
    command: python bot.py
    environment:
      - BOT_TOKEN=${BOT_TOKEN:-}
      - PROXY_URL=${PROXY_URL:-}
      - FAQ_PATH=/app/faq.json
      - REQUESTS_LOG=/data/requests.jsonl
      - SUGGESTIONS_LOG=/data/suggestions.jsonl
    volumes:
      - ./logs:/data
      - ./student_assistant/data/faq.json:/app/faq.json:ro

  # Telegram-бот преподавателя: документ/FAQ → квиз через DeepSeek.
  # Нужен TEACHER_BOT_TOKEN в .env. Запуск: docker compose up -d teacher_bot
  teacher_bot:
    build: ./teacher_pipeline/bot
    command: python teacher_bot.py
    environment:
      - TELEGRAM_TOKEN=${TEACHER_BOT_TOKEN:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - PROXY_URL=${PROXY_URL:-}
      - FAQ_PATH=/app/lecture_faq.json
    volumes:
      - ./student_assistant/data/lecture_faq.json:/app/lecture_faq.json:ro

  # Веб-генератор квизов для преподов (без Telegram): текст/файл → квиз в браузере
  quiz_server:
    build: ./teacher_pipeline/bot
    command: uvicorn quiz_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8020:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - GOTENBERG_URL=http://gotenberg:3000
    # gotenberg нужен только для PDF-экспорта; без него DOCX работает, PDF → 502.
    # Жёсткий depends_on не ставим, чтобы quiz_server поднимался и на лёгком боксе.

  # Конвертер офисных документов в PDF (LibreOffice+Chromium внутри). Тяжёлый — только full.
  gotenberg:
    image: gotenberg/gotenberg:8
    profiles: ["full"]
    command:
      - gotenberg
      - --api-timeout=180s

  # Сервис извлечения/рендера формул (pix2text + pandoc). Тяжёлый (~2GB моделей). Только full.
  formulas:
    build: ./formulas
    profiles: ["full"]
    command: uvicorn formulas_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    environment:
      - GOTENBERG_URL=http://gotenberg:3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - MAX_PAGES=${MAX_PAGES:-12}
      - OMP_NUM_THREADS=2
    # Чтобы pix2text не клал ноут: ограничиваем ядра и память
    cpus: "3.0"
    mem_limit: 4g
    depends_on:
      - gotenberg
    volumes:
      - model-cache:/root/.cache

  # Авторизация: подписанный cookie + проверка для nginx auth_request. Без БД.
  auth:
    build: ./auth
    environment:
      - AUTH_USERS=${AUTH_USERS:-admin:mirea}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-please}
      - SESSION_TTL=${SESSION_TTL:-43200}

  web:
    image: nginx:alpine
    ports:
      - "3001:80"
    depends_on:
      - auth
    volumes:
      # Страница входа (открыта): http://localhost:3001/login/
      - ./auth/web:/usr/share/nginx/html/login:ro
      # Общая дизайн-система (theme.css + app-header) для всех страниц: /shared/
      - ./shared:/usr/share/nginx/html/shared:ro
      # Единый портал (главная + текстовый чат): http://localhost:3001/ → /portal/
      - ./portal:/usr/share/nginx/html/portal:ro
      # Редирект корня на портал
      - ./portal/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Киоск: http://localhost:3001/kiosk/kiosk.html
      - ./teacher_pipeline/pipeline:/usr/share/nginx/html/kiosk:ro
      # Дашборд: http://localhost:3001/dashboard/dashboard.html
      - ./analytics:/usr/share/nginx/html/dashboard:ro
      # Веб-квиз преподавателя: http://localhost:3001/quiz/quiz.html
      - ./teacher_pipeline/quiz_web:/usr/share/nginx/html/quiz:ro
      # Извлечение формул: http://localhost:3001/formulas/extract.html
      - ./teacher_pipeline/formula_web:/usr/share/nginx/html/formulas:ro

volumes:
  model-cache:
