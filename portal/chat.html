<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Чат с ассистентом МИРЭА</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/theme.css">
    <link rel="stylesheet" href="/shared/vendor/katex/katex.min.css">
    <link rel="stylesheet" href="chat.css">
    <script defer src="/shared/layout.js"></script>
    <script defer src="vendor/marked.min.js"></script>
    <script defer src="vendor/purify.min.js"></script>
    <script defer src="/shared/vendor/katex/katex.min.js"></script>
    <script defer src="/shared/vendor/katex/contrib/auto-render.min.js"></script>
</head>
<body>
    <app-header title="Чат с ассистентом" subtitle="Спросите про поступление, учёбу и жизнь в РТУ МИРЭА" badge="💬"></app-header>

    <main>
        <div id="messages"></div>
        <form id="chat-form" autocomplete="off">
            <input id="chat-input" type="text" placeholder="Напишите вопрос…" autofocus>
            <button id="send-btn" type="submit">Отправить</button>
        </form>
    </main>

    <script src="chat.js"></script>
</body>
</html>
