server {
    listen 80;
    root /usr/share/nginx/html;

    # Относительный Location (иначе nginx подставит внутренний порт 80 вместо 3001)
    absolute_redirect off;
    # Отключаем кэш статики — браузер всегда берёт свежие html/css/js (демо/разработка)
    add_header Cache-Control "no-store" always;

    # --- Авторизация ---
    # Внутренняя проверка токена для auth_request (cookie → auth-сервис).
    location = /__verify {
        internal;
        proxy_pass http://auth:8000/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }
    # API авторизации (login/logout/verify) — открыто.
    location /api/auth/ {
        proxy_pass http://auth:8000/;
    }
    # Страница входа и общие ассеты (тема/шрифты для неё) — открыто.
    location ^~ /login/  { }
    location ^~ /shared/ { }

    # Всё остальное — только с валидным токеном; иначе на страницу входа.
    location = / {
        auth_request /__verify;
        error_page 401 = @login;
        return 302 /portal/;
    }
    location / {
        auth_request /__verify;
        error_page 401 = @login;
        try_files $uri $uri/ =404;
    }
    location @login { return 302 /login/; }
}
