server {
    listen 80;
    root /usr/share/nginx/html;
    # Docker DNS — отложенный резолвинг апстримов (web стартует, даже если бэкенд ещё/не поднят)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Относительный Location (иначе nginx подставит внутренний порт 80 вместо 3001)
    absolute_redirect off;
    # Отключаем кэш статики — браузер всегда берёт свежие html/css/js (демо/разработка)
    add_header Cache-Control "no-store" always;

    # --- Авторизация ---
    # Внутренняя проверка токена для auth_request (cookie → auth-сервис).
    location = /__verify {
        internal;
        proxy_pass http://auth:8000/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }
    # API авторизации (login/logout/verify) — открыто.
    location /api/auth/ {
        proxy_pass http://auth:8000/;
    }

    # --- API бэкендов под логин-гейтом (cookie проверяется auth_request) ---
    # chat_backend — сетевой алиас активного бэкенда (chat_light в light / voice_server в full).
    # rewrite срезает префикс (с переменной в proxy_pass nginx сам префикс НЕ режет).
    location /api/voice/ {
        auth_request /__verify;
        error_page 401 = @login;
        set $voice_up chat_backend;
        rewrite ^/api/voice/(.*)$ /$1 break;
        proxy_pass http://$voice_up:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 25m;
    }
    location /api/quiz/ {
        auth_request /__verify;
        error_page 401 = @login;
        set $quiz_up quiz_server;
        rewrite ^/api/quiz/(.*)$ /$1 break;
        proxy_pass http://$quiz_up:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 180s;
        client_max_body_size 50m;
    }
    location /api/formulas/ {
        auth_request /__verify;
        error_page 401 = @login;
        set $formulas_up formulas;
        rewrite ^/api/formulas/(.*)$ /$1 break;
        proxy_pass http://$formulas_up:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 180s;
        client_max_body_size 50m;
    }

    # Страница входа и общие ассеты (тема/шрифты для неё) — открыто.
    location ^~ /login/  { }
    location ^~ /shared/ { }

    # Всё остальное — только с валидным токеном; иначе на страницу входа.
    location = / {
        auth_request /__verify;
        error_page 401 = @login;
        return 302 /portal/;
    }
    location / {
        auth_request /__verify;
        error_page 401 = @login;
        try_files $uri $uri/ =404;
    }
    location @login { return 302 /login/; }
}
