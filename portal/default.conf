server {
    listen 80;
    root /usr/share/nginx/html;

    # Относительный Location (иначе nginx подставит внутренний порт 80 вместо 3001)
    absolute_redirect off;

    # Единый вход: корень ведёт на портал
    location = / { return 302 /portal/; }

    location / { try_files $uri $uri/ =404; }
}
