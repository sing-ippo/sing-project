<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ассистент РТУ МИРЭА</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/theme.css">
    <link rel="stylesheet" href="portal.css">
    <script defer src="/shared/layout.js"></script>
</head>
<body>
    <app-header title="Цифровой ассистент РТУ МИРЭА" subtitle="Выберите инструмент" back="none"></app-header>

    <main>
        <section class="group">
            <h2>Студенту и абитуриенту</h2>
            <div class="cards">
                <a class="card" href="/portal/chat.html">
                    <span class="card-ico">💬</span>
                    <span class="card-title">Чат с ассистентом</span>
                    <span class="card-desc">Напишите вопрос — ответ по базе МИРЭА</span>
                </a>
                <a class="card" href="/kiosk/kiosk.html">
                    <span class="card-ico">🎤</span>
                    <span class="card-title">Голосовой киоск</span>
                    <span class="card-desc">Спросите голосом — ответ голосом</span>
                </a>
            </div>
        </section>

        <section class="group">
            <h2>Преподавателю</h2>
            <div class="cards">
                <a class="card" href="/quiz/quiz.html">
                    <span class="card-ico">📝</span>
                    <span class="card-title">Генератор квизов</span>
                    <span class="card-desc">Текст или документ → тест (страницы, тема)</span>
                </a>
                <a class="card" href="/formulas/extract.html">
                    <span class="card-ico">∑</span>
                    <span class="card-title">Извлечение формул</span>
                    <span class="card-desc">Документ → LaTeX → Word</span>
                </a>
                <a class="card" href="/dashboard/dashboard.html">
                    <span class="card-ico">📊</span>
                    <span class="card-title">Аналитика</span>
                    <span class="card-desc">Запросы, отзывы, пробелы</span>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
