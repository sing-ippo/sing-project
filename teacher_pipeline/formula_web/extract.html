<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Извлечение формул — РТУ МИРЭА</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/theme.css">
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <link rel="stylesheet" href="extract.css">
    <script defer src="/shared/layout.js"></script>
    <script defer src="vendor/katex/katex.min.js"></script>
</head>
<body>
    <app-header title="Извлечение формул" subtitle="PDF, картинки, Word/PowerPoint/ODF, html, txt — формулы в LaTeX" badge="🔣"></app-header>

    <main>
        <section id="input-block">
            <label>Страницы (PDF): <input type="text" id="pages-input" placeholder="напр. 1-10, пусто = первые 12" size="22"></label>
            <label class="file-label">
                📎 Выбрать документ
                <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.webp,.bmp,.gif,.docx,.doc,.pptx,.ppt,.odt,.ods,.odp,.rtf,.html,.htm,.epub,.xls,.xlsx,.txt,.md,.tex" hidden>
            </label>
            <span id="file-name"></span>

            <div id="progress" hidden>
                <div class="bar"><div class="bar-fill"></div></div>
                <div id="status"></div>
            </div>
            <details id="debug-box" class="debug-box" open>
                <summary>Дебаг</summary>
                <pre id="debug-log" class="debug-log"></pre>
            </details>
        </section>

        <button id="download-btn" hidden>📄 Скачать Word (.docx)</button>
        <section id="results"></section>
    </main>

    <script src="extract.js"></script>
</body>
</html>
