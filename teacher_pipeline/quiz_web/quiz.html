<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор квизов — РТУ МИРЭА</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/theme.css">
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <link rel="stylesheet" href="quiz.css">
    <script defer src="/shared/layout.js"></script>
    <script defer src="vendor/katex/katex.min.js"></script>
    <script defer src="vendor/katex/contrib/auto-render.min.js"></script>
</head>
<body>
    <app-header title="Генератор квизов" subtitle="Текст или документ → готовый тест с проверкой" badge="📝"></app-header>

    <main>
        <section id="input-block" class="card">
            <div class="segmented" role="tablist">
                <button id="mode-text" class="seg active" type="button">📝 Текст</button>
                <button id="mode-doc" class="seg" type="button">📄 Документ</button>
            </div>

            <!-- Режим: текст -->
            <div id="pane-text" class="pane">
                <textarea id="text-input" placeholder="Вставьте фрагмент лекции, конспекта или темы…"></textarea>
            </div>

            <!-- Режим: документ -->
            <div id="pane-doc" class="pane" hidden>
                <label class="dropzone" id="dropzone">
                    <input type="file" id="file-input" accept=".pdf,.docx,.txt" hidden>
                    <span class="dz-icon">⬆️</span>
                    <span class="dz-text" id="file-name">Выбрать документ (.pdf / .docx / .txt)</span>
                </label>
                <div class="doc-opts">
                    <label>Страницы (PDF)
                        <input type="text" id="pages-input" placeholder="напр. 1-10">
                    </label>
                    <label>Тема (необязательно)
                        <input type="text" id="topic-input" placeholder="напр. интегралы">
                    </label>
                </div>
            </div>

            <div class="controls">
                <label class="num-field">Вопросов
                    <input type="number" id="num-input" value="5" min="1" max="10">
                </label>
                <button id="gen-btn" type="button">Сгенерировать квиз</button>
            </div>

            <div id="progress" hidden>
                <div class="bar"><div class="bar-fill"></div></div>
                <div id="status"></div>
            </div>

            <details id="debug-box" class="debug-box">
                <summary>Подробности</summary>
                <pre id="debug-log" class="debug-log"></pre>
            </details>
        </section>

        <section id="quiz-block" class="card" hidden>
            <div id="quiz-toolbar">
                <select id="export-format">
                    <option value="pdf">PDF (печать)</option>
                    <option value="docx">Word (печать)</option>
                    <option value="xml">Moodle XML</option>
                    <option value="gift">GIFT</option>
                </select>
                <label class="answers-toggle"><input type="checkbox" id="export-answers"> с ключом ответов</label>
                <button id="export-btn" type="button">⬇ Скачать</button>
            </div>
            <div id="question-area"></div>
            <div id="result-area" hidden></div>
            <button id="restart-btn" type="button" hidden>Новый квиз</button>
        </section>
    </main>

    <script src="quiz.js"></script>
</body>
</html>
