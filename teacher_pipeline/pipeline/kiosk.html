<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой ассистент МИРЭА</title>
    <link rel="stylesheet" href="kiosk.css">
</head>
<body>
    <a href="/portal/" style="position:fixed;top:12px;left:12px;z-index:9999;background:#fff;color:#2196f3;text-decoration:none;padding:8px 14px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15);font:600 15px/1 sans-serif;">← В меню</a>
    <header>
        <img src="logo.jpg" alt="РТУ МИРЭА" onerror="this.style.display='none'">
        <h1>Голосовой ассистент абитуриента</h1>
    </header>

    <main>
        <button id="record-btn">🎤 Говори</button>
        <div id="question"></div>
        <div id="answer"></div>
        <div id="feedback" hidden>
            <span class="feedback-label">Помогло?</span>
            <button id="fb-yes" class="fb-btn">👍 Да</button>
            <button id="fb-no" class="fb-btn">👎 Нет</button>
        </div>
    </main>

    <script src="kiosk.js"></script>
</body>
</html>
