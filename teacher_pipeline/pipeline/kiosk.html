<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой ассистент МИРЭА</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/theme.css">
    <link rel="stylesheet" href="kiosk.css">
    <script defer src="/shared/layout.js"></script>
</head>
<body>
    <app-header title="Голосовой ассистент абитуриента" logo="logo.jpg"></app-header>

    <main>
        <button id="record-btn">🎤 Говори</button>
        <div id="question"></div>
        <div id="answer"></div>
        <div id="video"></div>
        <div id="feedback" hidden>
            <span class="feedback-label">Помогло?</span>
            <button id="fb-yes" class="fb-btn">👍 Да</button>
            <button id="fb-no" class="fb-btn">👎 Нет</button>
        </div>
    </main>

    <script src="kiosk.js"></script>
</body>
</html>
